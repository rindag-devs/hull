name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Lix
        uses: canidae-solutions/lix-quick-install-action@v4

      - name: Lint
        run: nix develop .#default --command just lint

      - name: Build all test problems
        run: nix develop .#default --command just all-problems

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Integration tests
        run: nix develop .#default --command just integration
